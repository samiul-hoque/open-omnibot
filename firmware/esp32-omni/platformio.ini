; PlatformIO Configuration for Omni-2 Robot
; ESP32 with WebSocket-based control

[platformio]
default_envs = mhetesp32minikit

[env:mhetesp32minikit]
platform = espressif32@6.9.0
board = mhetesp32minikit
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Bundled Arduino-ESP32 partition scheme — shrinks the unused SPIFFS
; region from 1.44 MB → 128 KB and redistributes to ~1.875 MB per
; OTA app slot (from 1.28 MB). NVS is unchanged at 20 KB, so
; IMU / motor / (future) open-loop calibrations persist across the
; reflash. Applying this requires a one-time USB flash since the
; partition table itself lives outside the OTA slots — subsequent
; flashes OTA again normally.
board_build.partitions = min_spiffs.csv

lib_deps =
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.0
    adafruit/Adafruit BNO055@^1.6.3
    adafruit/Adafruit Unified Sensor@^1.1.14
    https://github.com/me-no-dev/AsyncTCP.git#ca8ac5f
    https://github.com/me-no-dev/ESPAsyncWebServer.git#f71e3d4
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DASYNCWEBSERVER_REGEX=0
    -Wall
    -Wno-deprecated-declarations

; ============================================
; OTA Upload Environment
; ============================================
; Upload over WiFi: pio run -t upload -e ota
; Override IP:      pio run -t upload -e ota --upload-port 192.168.68.xxx
; Requires WSL2 mirrored networking (networkingMode=mirrored in .wslconfig)
[env:ota]
extends = env:mhetesp32minikit
upload_protocol = espota
upload_port = omni2.local

; ============================================
; Native Test Environment
; ============================================
; Run with: pio test -e native
[env:native]
platform = native
test_framework = unity
build_flags = -std=c++11
